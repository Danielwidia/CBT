<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CBT SMP KRISTEN DORKAS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50 min-h-screen">

    <!-- Login Screen -->
    <div id="login-screen" class="min-h-screen flex items-center justify-center p-6 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] bg-slate-50">
        <div class="max-w-3xl w-full grid grid-cols-1 md:grid-cols-2 gap-10 items-center">
            <div class="space-y-8 text-center md:text-left">
                <div class="inline-block p-4 bg-white rounded-[32px] shadow-2xl shadow-sky-100 animate-bounce">
                    <img src="logo.png" class="w-16 h-16 object-contain" onerror="this.src='https://placehold.co/64x64?text=Logo'">
                </div>
                <div>
                    <h1 class="text-4xl font-black text-slate-800 leading-tight tracking-tighter">
                        Computer Based <br><span class="text-sky-600">Test (CBT)</span>
                    </h1>
                    <p class="text-slate-400 mt-3 text-base font-medium">SMP KRISTEN DORKAS Portal Ujian</p>
                </div>
                <div class="flex flex-wrap gap-4 justify-center md:justify-start">
                    <div class="flex items-center gap-3 bg-white px-5 py-3 rounded-2xl shadow-sm border border-slate-100">
                        <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
                        <span class="text-xs font-bold text-slate-600 uppercase tracking-widest">Server Online</span>
                    </div>
                </div>
            </div>

            <div class="space-y-4">
                <button onclick="showLoginForm('student')" class="group w-full p-6 bg-white rounded-[32px] border-2 border-transparent hover:border-sky-500 transition-all shadow-lg hover:shadow-xl hover:-translate-y-1 flex items-center gap-5">
                    <div class="w-16 h-16 bg-sky-50 text-sky-600 rounded-2xl flex items-center justify-center text-2xl group-hover:bg-sky-600 group-hover:text-white transition-all">
                        <i class="fas fa-user-graduate"></i>
                    </div>
                    <div class="text-left">
                        <h3 class="text-lg font-black text-slate-800">Siswa</h3>
                        <p class="text-slate-400 text-xs font-medium">Mulai mengerjakan ujian</p>
                    </div>
                    <i class="fas fa-chevron-right ml-auto text-slate-300 group-hover:text-sky-500 transition-all"></i>
                </button>

                <button onclick="showLoginForm('teacher')" class="group w-full p-6 bg-white rounded-[32px] border-2 border-transparent hover:border-amber-500 transition-all shadow-lg hover:shadow-xl hover:-translate-y-1 flex items-center gap-5">
                    <div class="w-16 h-16 bg-amber-50 text-amber-600 rounded-2xl flex items-center justify-center text-2xl group-hover:bg-amber-600 group-hover:text-white transition-all">
                        <i class="fas fa-chalkboard-teacher"></i>
                    </div>
                    <div class="text-left">
                        <h3 class="text-lg font-black text-slate-800">Guru</h3>
                        <p class="text-slate-400 text-xs font-medium">Kelola soal & hasil nilai</p>
                    </div>
                    <i class="fas fa-chevron-right ml-auto text-slate-300 group-hover:text-amber-500 transition-all"></i>
                </button>

                <button onclick="showLoginForm('admin')" class="group w-full p-6 bg-slate-900 rounded-[32px] border-2 border-transparent hover:border-sky-400 transition-all shadow-lg hover:shadow-xl hover:-translate-y-1 flex items-center gap-5">
                    <div class="w-16 h-16 bg-slate-800 text-sky-400 rounded-2xl flex items-center justify-center text-2xl group-hover:bg-sky-500 group-hover:text-white transition-all">
                        <i class="fas fa-user-shield"></i>
                    </div>
                    <div class="text-left">
                        <h3 class="text-lg font-black text-white">Administrator</h3>
                        <p class="text-slate-400 text-xs font-medium">Pengaturan penuh sistem</p>
                    </div>
                    <i class="fas fa-lock ml-auto text-slate-600 group-hover:text-sky-400 transition-all"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Auth Modal -->
    <div id="auth-modal" class="fixed inset-0 bg-slate-900/40 hidden items-center justify-center p-4 z-50 backdrop-blur-sm">
        <div class="bg-white rounded-[32px] max-w-sm w-full p-8 shadow-2xl animate-fade-in relative">
            <button onclick="closeModals()" class="absolute top-5 right-5 w-8 h-8 rounded-full bg-slate-50 text-slate-400 hover:text-slate-600 hover:bg-slate-100 transition-all flex items-center justify-center font-bold">✕</button>
            
            <div class="text-center mb-6">
                <div id="auth-icon" class="w-16 h-16 bg-slate-50 rounded-2xl flex items-center justify-center text-2xl mx-auto mb-3">
                    <i class="fas fa-user-lock text-slate-400"></i>
                </div>
                <h3 id="auth-title" class="text-2xl font-black text-slate-800 tracking-tight">Login</h3>
            </div>

            <div class="space-y-4">
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">ID / Nama Lengkap</label>
                    <input type="text" id="username" class="w-full px-6 py-4 bg-slate-50 rounded-2xl border-none outline-none focus:ring-2 focus:ring-sky-500 transition-all font-bold text-sm" placeholder="Contoh: DRKS-1234">
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Password</label>
                    <input type="password" id="password" class="w-full px-6 py-4 bg-slate-50 rounded-2xl border-none outline-none focus:ring-2 focus:ring-sky-500 transition-all font-bold text-sm" placeholder="••••••••">
                </div>
                <div id="login-error" class="hidden text-red-500 text-[10px] font-bold bg-red-50 p-4 rounded-xl border border-red-100 animate-shake"></div>
                <button id="login-btn" class="w-full py-5 bg-sky-600 text-white font-black rounded-2xl hover:bg-sky-700 shadow-xl shadow-sky-100 transition-all mt-4 tracking-widest text-xs">MASUK SEKARANG</button>
            </div>
        </div>
    </div>

    <script src="assets/js/core.js"></script>
    <script>
        var initRetries = 0;
        async function init() {
            // Check if core.js is loaded
            if (typeof SESSION_KEY === 'undefined') {
                initRetries++;
                if (initRetries > 20) { // Approx 10 seconds
                    document.body.innerHTML = `
                        <div class="min-h-screen flex items-center justify-center bg-slate-50 p-6 font-sans text-center">
                            <div class="max-w-sm w-full bg-white p-10 rounded-[32px] shadow-2xl border border-red-50">
                                <div class="w-16 h-16 bg-red-50 text-red-500 rounded-2xl flex items-center justify-center text-2xl mx-auto mb-6">
                                    <i class="fas fa-exclamation-triangle"></i>
                                </div>
                                <h1 class="text-xl font-black text-slate-800 mb-2">Gagal Memuat Sistem</h1>
                                <p class="text-slate-500 text-xs font-medium leading-relaxed mb-8">Data inti aplikasi (core.js) gagal dimuat. Pastikan koneksi stabil atau coba Deploy ulang di Vercel.</p>
                                <button onclick="location.reload()" class="w-full py-4 bg-sky-600 text-white font-black rounded-2xl hover:bg-sky-700 shadow-xl shadow-sky-100 transition-all">Segarkan Halaman</button>
                            </div>
                        </div>
                    `;
                    return;
                }
                console.warn('Waiting for core.js... (Attempt ' + initRetries + ')');
                setTimeout(init, 500);
                return;
            }

            // First attempt server fetch
            try {
                console.log('Loading database from server...');
                var res = await fetch(getApiBaseUrl() + '/api/db');
                if (!res.ok && (res.status === 404 || res.status === 0)) {
                    res = await fetch('database.json');
                }
                if (res.ok) {
                    var serverDb = await res.json();
                    if (serverDb && typeof serverDb === 'object') {
                        db = normalizeDb(serverDb);
                        console.log('Database loaded from server');
                    }
                }
            } catch (err) {
                console.warn('Failed to load from server:', err.message);
            }

            // Fallback: load from local store
            try {
                var savedLocal = await loadLocalDb();
                if (savedLocal) {
                    db = savedLocal;
                    console.log('Database loaded from local store');
                }
            } catch (e) {
                console.error('Error loading database:', e);
            }

            // Check session
            var saved = localStorage.getItem(SESSION_KEY);
            if (saved) {
                try {
                    var session = JSON.parse(saved);
                    if (session && session.user) {
                        redirectUser(session.user.role);
                    }
                } catch (e) {
                    console.error('Session error:', e);
                }
            }
        }

        function showLoginForm(type) {
            window.loginType = type;
            const modal = document.getElementById('auth-modal');
            const title = document.getElementById('auth-title');
            const icon = document.getElementById('auth-icon');
            const btn = document.getElementById('login-btn');
            
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            
            if (type === 'admin') {
                title.innerText = 'Admin Login';
                icon.className = 'w-16 h-16 bg-slate-900 text-sky-400 rounded-2xl flex items-center justify-center text-2xl mx-auto mb-4';
                btn.className = 'w-full py-4 bg-slate-900 text-white font-black rounded-2xl hover:bg-black shadow-xl transition-all mt-4 tracking-widest text-xs';
            } else if (type === 'teacher') {
                title.innerText = 'Guru Login';
                icon.className = 'w-16 h-16 bg-amber-50 text-amber-600 rounded-2xl flex items-center justify-center text-2xl mx-auto mb-4';
                btn.className = 'w-full py-4 bg-amber-600 text-white font-black rounded-2xl hover:bg-amber-700 shadow-xl shadow-amber-100 transition-all mt-4 tracking-widest text-xs';
            } else {
                title.innerText = 'Siswa Login';
                icon.className = 'w-16 h-16 bg-sky-50 text-sky-600 rounded-2xl flex items-center justify-center text-2xl mx-auto mb-4';
                btn.className = 'w-full py-4 bg-sky-600 text-white font-black rounded-2xl hover:bg-sky-700 shadow-xl shadow-sky-100 transition-all mt-4 tracking-widest text-xs';
            }
        }

        function handleLogin() {
            var u = document.getElementById('username').value.trim().toUpperCase();
            var p = document.getElementById('password').value.trim();
            var type = window.loginType;

            if (typeof db === 'undefined' || !db.students) return alert('Database belum siap atau sistem mengalami kendala memuat data!');

            var user = db.students.find(x => x.id.toUpperCase() === u && x.password === p);

            // Special case for students: search by name
            if (!user && type === 'student') {
                const nameSearch = u.toLowerCase();
                user = db.students.find(x => x.name.toLowerCase().includes(nameSearch) && x.password === p && x.role === 'student');
            }

            if (user && user.role === type) {
                localStorage.setItem(SESSION_KEY, JSON.stringify({ user, timestamp: Date.now() }));
                redirectUser(user.role);
            } else {
                const err = document.getElementById('login-error');
                err.innerText = 'ID / Password salah atau role tidak sesuai!';
                err.classList.remove('hidden');
                setTimeout(() => err.classList.add('hidden'), 3000);
            }
        }

        function redirectUser(role) {
            if (role === 'admin') window.location.href = 'admin.html';
            else if (role === 'teacher') window.location.href = 'teacher.html';
            else if (role === 'student') window.location.href = 'student.html';
        }

        function closeModals() {
            document.getElementById('auth-modal').classList.add('hidden');
            document.getElementById('auth-modal').classList.remove('flex');
        }

        document.getElementById('login-btn').addEventListener('click', handleLogin);
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
