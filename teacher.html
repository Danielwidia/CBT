<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard - CBT SMP KRISTEN DORKAS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50 min-h-screen">
    <!-- Teacher Dashboard -->
    <div id="teacher-dashboard" class="min-h-screen">
        <nav class="bg-white px-8 py-4 border-b border-slate-100 flex justify-between items-center sticky top-0 z-20 shadow-sm">
            <div class="flex items-center gap-4">
                <img src="logo.png" class="w-10 h-10 object-contain" onerror="this.src='https://placehold.co/40x40?text=Logo'">
                <div>
                    <h2 class="text-sm font-black text-amber-600 uppercase tracking-tight">SMP KRISTEN DORKAS - GURU</h2>
                    <p id="teacher-info-label" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest"></p>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="logout()" class="px-4 py-2 bg-red-50 text-red-600 rounded-xl font-black text-xs hover:bg-red-600 hover:text-white transition-all">LOGOUT</button>
            </div>
        </nav>

        <main class="p-8">
            <div class="max-w-7xl mx-auto">
                <!-- Tab Navigation -->
                <div class="flex gap-2 mb-8 border-b border-slate-200">
                    <button onclick="switchTeacherTab('bank-soal')" id="tab-bank-soal" class="px-6 py-3 font-bold text-amber-600 border-b-2 border-amber-600 transition-all">
                        <i class="fas fa-book mr-2"></i>Bank Soal
                    </button>
                    <button onclick="switchTeacherTab('hasil-ujian')" id="tab-hasil-ujian" class="px-6 py-3 font-bold text-slate-400 border-b-2 border-transparent hover:text-slate-700 transition-all">
                        <i class="fas fa-check-circle mr-2"></i>Hasil Ujian
                    </button>
                </div>

                <!-- Bank Soal Tab -->
                <div id="teacher-tab-bank-soal" class="teacher-tab-content active">
                    <div class="flex flex-col lg:flex-row justify-between gap-4 mb-8">
                        <div>
                            <h1 class="text-3xl font-black text-slate-800 mb-2">Bank Soal Saya</h1>
                            <p class="text-slate-400 text-sm">Kelola soal mata pelajaran yang Anda ampu.</p>
                        </div>
                        <div class="grid grid-cols-2 sm:flex gap-2">
                            <button onclick="openQuestionModal()" class="px-4 py-2 bg-amber-600 text-white rounded-xl text-xs font-bold transition-all hover:bg-amber-700 shadow-lg shadow-amber-100">+ Soal Baru</button>
                            <button onclick="exportQuestions()" class="px-4 py-2 bg-slate-800 text-white rounded-xl text-xs font-bold transition-all hover:bg-slate-900"><i class="fas fa-download mr-1"></i> Export JSON</button>
                            <button onclick="importQuestionsJSON()" class="px-4 py-2 bg-slate-200 text-slate-700 rounded-xl text-xs font-bold transition-all hover:bg-slate-300"><i class="fas fa-upload mr-1"></i> Import JSON</button>
                            <button onclick="openTeacherAiModal()" class="px-4 py-2 bg-rose-600 text-white rounded-xl text-xs font-bold transition-all hover:bg-rose-700"><i class="fas fa-robot mr-1"></i> AI Soal</button>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
                        <div class="lg:col-span-1 space-y-4">
                            <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                                <h4 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Filter Soal</h4>
                                <div class="space-y-4">
                                    <div class="relative">
                                        <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                                        <input type="text" id="teacher-search-questions" onkeyup="renderTeacherQuestions()" placeholder="Cari soal..." class="w-full pl-10 pr-4 py-3 bg-slate-50 rounded-xl text-xs font-bold outline-none ring-1 ring-slate-100 focus:ring-2 focus:ring-amber-500">
                                    </div>
                                    <select id="teacher-filter-mapel" onchange="renderTeacherQuestions()" class="w-full p-3 bg-slate-50 rounded-xl text-xs font-bold outline-none ring-1 ring-slate-100"></select>
                                    <select id="teacher-filter-rombel" onchange="renderTeacherQuestions()" class="w-full p-3 bg-slate-50 rounded-xl text-xs font-bold outline-none ring-1 ring-slate-100">
                                        <option value="">Semua Rombel</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                        <div class="lg:col-span-3">
                            <div class="bg-white rounded-3xl border border-slate-100 shadow-sm overflow-hidden">
                                <table class="w-full text-left text-sm">
                                    <thead class="bg-slate-50 border-b border-slate-100">
                                        <tr>
                                            <th class="px-6 py-4 font-black text-slate-400 text-[10px] uppercase">Soal</th>
                                            <th class="px-6 py-4 font-black text-slate-400 text-[10px] uppercase">Kelas</th>
                                            <th class="px-6 py-4 font-black text-slate-400 text-[10px] uppercase text-center">Aksi</th>
                                        </tr>
                                    </thead>
                                    <tbody id="teacher-questions-table-body" class="divide-y divide-slate-50"></tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Hasil Ujian Tab -->
                <div id="teacher-tab-hasil-ujian" class="teacher-tab-content hidden">
                    <!-- Similar structure to results tab in admin -->
                    <div class="flex justify-between items-center mb-8">
                        <div>
                            <h1 class="text-3xl font-black text-slate-800 mb-2">Hasil Ujian Siswa</h1>
                            <p class="text-slate-400 text-sm">Data nilai siswa berdasarkan mapel Anda.</p>
                        </div>
                        <button onclick="exportTeacherResultsToExcel()" class="px-4 py-2 bg-emerald-600 text-white rounded-xl text-xs font-bold transition-all hover:bg-emerald-700 shadow-lg shadow-emerald-100 flex items-center gap-2"><i class="fas fa-file-excel"></i> Export Excel</button>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
                        <div class="lg:col-span-1 space-y-4">
                            <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                                <h4 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Filter Hasil</h4>
                                <div class="space-y-4">
                                    <select id="teacher-results-filter-mapel" onchange="renderTeacherResults()" class="w-full p-3 bg-slate-50 rounded-xl text-xs font-bold outline-none ring-1 ring-slate-100"></select>
                                    <select id="teacher-results-filter-rombel" onchange="renderTeacherResults()" class="w-full p-3 bg-slate-50 rounded-xl text-xs font-bold outline-none ring-1 ring-slate-100">
                                        <option value="">Semua Rombel</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                        <div class="lg:col-span-3">
                            <div class="bg-white rounded-3xl border border-slate-100 shadow-sm overflow-hidden">
                                <table class="w-full text-left text-sm">
                                    <thead class="bg-slate-50 border-b border-slate-100 text-[10px] font-black text-slate-400 uppercase tracking-widest">
                                        <tr>
                                            <th class="px-6 py-4">Siswa</th>
                                            <th class="px-6 py-4">Rombel</th>
                                            <th class="px-6 py-4">Mapel</th>
                                            <th class="px-6 py-4 text-center">Nilai</th>
                                            <th class="px-6 py-4 text-center">Aksi</th>
                                        </tr>
                                    </thead>
                                    <tbody id="teacher-results-table-body" class="divide-y divide-slate-50"></tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modals (Borrowed from admin but scoped for teacher) -->
    <!-- Question Modal -->
    <div id="question-modal" class="fixed inset-0 bg-slate-900/60 hidden items-center justify-center p-4 z-50 backdrop-blur-sm shadow-2xl">
        <div class="bg-white rounded-[32px] max-w-4xl w-full p-8 shadow-2xl animate-fade-in relative overflow-y-auto max-h-[90vh]">
            <div class="flex justify-between items-center mb-8">
                <h3 id="question-modal-title" class="text-2xl font-black text-slate-800">Soal Baru</h3>
                <button onclick="closeModals()" class="w-10 h-10 rounded-full bg-slate-50 text-slate-400 hover:text-slate-600 hover:bg-slate-100 transition-all flex items-center justify-center font-bold">X</button>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-6">
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2">Tipe Pertanyaan</label>
                        <select id="q-type" onchange="onQuestionTypeChange()" class="w-full px-5 py-4 bg-slate-50 rounded-2xl outline-none ring-1 ring-slate-100 focus:ring-2 focus:ring-amber-500 font-bold text-sm">
                            <option value="single">Pilihan Ganda Tunggal</option>
                            <option value="multiple">Pilihan Ganda Kompleks</option>
                            <option value="tf">Benar / Salah</option>
                            <option value="matching">Menjodohkan</option>
                            <option value="text">Esai / Uraian</option>
                        </select>
                    </div>

                    <div id="q-text-group">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2">Konten Pertanyaan</label>
                        <textarea id="q-text" rows="6" class="w-full px-5 py-4 bg-slate-50 rounded-2xl outline-none ring-1 ring-slate-100 focus:ring-2 focus:ring-amber-500 font-medium text-sm leading-relaxed" placeholder="Tulis soal di sini..."></textarea>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2">Mata Pelajaran</label>
                            <select id="q-mapel" class="w-full px-5 py-4 bg-slate-50 rounded-2xl outline-none ring-1 ring-slate-100 focus:ring-2 focus:ring-amber-500 font-bold text-sm"></select>
                        </div>
                        <div>
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2">Rombel / Kelas</label>
                            <select id="q-rombel" class="w-full px-5 py-4 bg-slate-50 rounded-2xl outline-none ring-1 ring-slate-100 focus:ring-2 focus:ring-amber-500 font-bold text-sm"></select>
                        </div>
                    </div>
                </div>

                <div class="space-y-6">
                    <div id="q-opsi-group">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-4">Pilihan Jawaban</label>
                        <div id="q-opts-container" class="space-y-3">
                            <div class="flex gap-3 items-center">
                                <span class="w-10 h-10 bg-slate-100 rounded-xl flex items-center justify-center font-black text-sm text-slate-400">A</span>
                                <input type="text" class="q-opt w-full px-5 py-3 bg-slate-50 rounded-xl outline-none ring-1 ring-slate-100 focus:ring-2 focus:ring-amber-500 font-medium text-sm" placeholder="Opsi A">
                            </div>
                            <div class="flex gap-3 items-center">
                                <span class="w-10 h-10 bg-slate-100 rounded-xl flex items-center justify-center font-black text-sm text-slate-400">B</span>
                                <input type="text" class="q-opt w-full px-5 py-3 bg-slate-50 rounded-xl outline-none ring-1 ring-slate-100 focus:ring-2 focus:ring-amber-500 font-medium text-sm" placeholder="Opsi B">
                            </div>
                            <div class="flex gap-3 items-center">
                                <span class="w-10 h-10 bg-slate-100 rounded-xl flex items-center justify-center font-black text-sm text-slate-400">C</span>
                                <input type="text" class="q-opt w-full px-5 py-3 bg-slate-50 rounded-xl outline-none ring-1 ring-slate-100 focus:ring-2 focus:ring-amber-500 font-medium text-sm" placeholder="Opsi C">
                            </div>
                            <div class="flex gap-3 items-center">
                                <span class="w-10 h-10 bg-slate-100 rounded-xl flex items-center justify-center font-black text-sm text-slate-400">D</span>
                                <input type="text" class="q-opt w-full px-5 py-3 bg-slate-50 rounded-xl outline-none ring-1 ring-slate-100 focus:ring-2 focus:ring-amber-500 font-medium text-sm" placeholder="Opsi D">
                            </div>
                        </div>

                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mt-6 mb-2">Jawaban Benar</label>
                        <div id="q-correct-buttons-group" class="flex gap-2">
                            <button onclick="setActiveCorrect(0)" class="c-btn flex-1 py-3 border-2 border-slate-100 text-slate-400 font-bold rounded-xl hover:bg-slate-50 transition-all">A</button>
                            <button onclick="setActiveCorrect(1)" class="c-btn flex-1 py-3 border-2 border-slate-100 text-slate-400 font-bold rounded-xl hover:bg-slate-50 transition-all">B</button>
                            <button onclick="setActiveCorrect(2)" class="c-btn flex-1 py-3 border-2 border-slate-100 text-slate-400 font-bold rounded-xl hover:bg-slate-50 transition-all">C</button>
                            <button onclick="setActiveCorrect(3)" class="c-btn flex-1 py-3 border-2 border-slate-100 text-slate-400 font-bold rounded-xl hover:bg-slate-50 transition-all">D</button>
                        </div>
                    </div>

                    <div id="q-answer-text-container" class="hidden">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2">Kunci Jawaban Esai</label>
                        <textarea id="q-answer-text" rows="6" class="w-full px-5 py-4 bg-emerald-50 text-emerald-900 rounded-2xl outline-none border-2 border-emerald-100 font-medium text-sm" placeholder="Tulis kunci jawaban benar di sini..."></textarea>
                    </div>

                    <div id="q-tf-container" class="hidden space-y-3">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2">Pernyataan Benar/Salah</label>
                        <button onclick="addTfRow()" class="w-full py-2 bg-slate-100 text-slate-600 rounded-xl text-[10px] font-bold">+ TAMBAH BARIS</button>
                    </div>

                    <div id="q-matching-container" class="hidden">
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2">Sisi Kiri (Soal)</label>
                                <div id="q-matching-questions" class="space-y-2"></div>
                                <button onclick="addMatchingQRow()" class="w-full py-2 bg-slate-100 text-slate-600 rounded-xl text-[10px] font-bold mt-2">+ TAMBAH</button>
                            </div>
                            <div>
                                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2">Sisi Kanan (Jawaban)</label>
                                <div id="q-matching-answers" class="space-y-2"></div>
                                <button onclick="addMatchingARow()" class="w-full py-2 bg-slate-100 text-slate-600 rounded-xl text-[10px] font-bold mt-2">+ TAMBAH</button>
                            </div>
                        </div>
                    </div>

                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-3">Media (Gambar)</label>
                        <input type="file" id="q-image-file" multiple accept="image/*" onchange="previewQuestionImages(event)" class="hidden">
                        <button onclick="document.getElementById('q-image-file').click()" class="w-full py-4 border-2 border-dashed border-slate-200 rounded-2xl text-slate-400 hover:border-amber-400 hover:text-amber-600 transition-all font-bold text-xs"><i class="fas fa-image mr-2"></i> UNGGAH GAMBAR</button>
                        <div id="q-images-preview" class="flex flex-wrap gap-2 mt-4"></div>
                        <div id="q-images-list" class="mt-4 space-y-2"></div>
                    </div>
                </div>
            </div>

            <div class="mt-8 flex gap-3">
                <button onclick="closeModals()" class="flex-1 py-4 bg-slate-100 text-slate-600 font-black rounded-2xl hover:bg-slate-200 transition-all">BATAL</button>
                <button onclick="saveQuestion()" id="save-question-btn" class="flex-[2] py-4 bg-amber-600 text-white font-black rounded-2xl hover:bg-amber-700 shadow-xl shadow-amber-100 transition-all">SIMPAN SOAL</button>
            </div>
        </div>
    </div>

    <!-- AI Modal -->
    <div id="ai-modal" class="fixed inset-0 bg-slate-900/60 hidden items-center justify-center p-4 z-[60] backdrop-blur-sm">
        <div class="bg-white rounded-3xl max-w-md w-full p-8 shadow-2xl animate-fade-in">
            <h3 class="text-xl font-black mb-6">Buat Soal AI</h3>
            <!-- Content similar to admin ai-modal -->
            <div class="space-y-4">
                <input type="text" id="ai-materi" class="w-full px-5 py-3 bg-slate-50 rounded-2xl outline-none" placeholder="Materi / Topik">
                <div class="grid grid-cols-2 gap-3">
                    <input type="number" id="ai-jumlah" value="5" class="w-full px-5 py-3 bg-slate-50 rounded-2xl">
                    <select id="ai-type" class="w-full px-5 py-3 bg-slate-50 rounded-2xl">
                        <option value="single">Pilihan Ganda</option>
                    </select>
                </div>
                <button onclick="generateQuestionsWithAi()" class="w-full py-4 bg-rose-600 text-white font-bold rounded-2xl hover:bg-rose-700">GENERATE</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
    <script src="assets/js/core.js"></script>
    <script src="assets/js/teacher.js"></script>
</body>
</html>
